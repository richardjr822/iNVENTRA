<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!-- Flash-of-unstyled-content prevention: apply theme before paint -->
		<script>
			try {
				const saved = localStorage.getItem('theme');
				if (
					saved === 'dark' ||
					(saved === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
				) {
					document.documentElement.classList.add('dark');
				} else {
					document.documentElement.classList.remove('dark');
				}
			} catch (_) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- Skip to main content link (accessibility) -->
		<a
			href="#main-content"
			class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-[9999] focus:flex focus:items-center focus:gap-2 focus:rounded-xl focus:border focus:border-border focus:bg-background focus:px-4 focus:py-2.5 focus:text-sm focus:font-bold focus:text-foreground focus:shadow-lg focus:outline-none focus:ring-2 focus:ring-ring"
		>
			Skip to main content
		</a>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
